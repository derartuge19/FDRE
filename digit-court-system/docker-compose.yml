version: '3.8'
services:
  # Database Services
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: court_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./court-customizations/database:/docker-entrypoint-initdb.d
    networks:
      - court-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - court-network

  # DIGIT Core Services (Customized for Courts)
  digit-user-service:
    build: 
      context: ./core-services/digit-user-service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - SPRING_PROFILES_ACTIVE=court
      - SERVER_SERVLET_CONTEXT-PATH=/user
      - APP_SERVER_PORT=3001
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/court_system
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    volumes:
      - ./court-customizations/configs/user-service:/app/config
    depends_on:
      - postgres
      - redis
    networks:
      - court-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/user/_health"]
      interval: 30s
      timeout: 10s
      retries: 3

  digit-mdms-service:
    build:
      context: ./core-services/digit-mdms-service
      dockerfile: Dockerfile
    ports:
      - "3007:3007"
    environment:
      - SPRING_PROFILES_ACTIVE=court
      - SERVER_SERVLET_CONTEXT-PATH=/egov-mdms-service
      - APP_SERVER_PORT=3007
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/court_system
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - EGOV_USER_SERVICE_HOST=http://digit-user-service:3001
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    volumes:
      - ./court-customizations/configs/mdms-service:/app/config
      - ./court-customizations/data:/app/data
    depends_on:
      - postgres
      - redis
      - digit-user-service
    networks:
      - court-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3007/egov-mdms-service/v1/_health"]
      interval: 30s
      timeout: 10s
      retries: 3

  digit-workflow-service:
    build:
      context: ./core-services/digit-workflow-service
      dockerfile: Dockerfile
    ports:
      - "3006:3006"
    environment:
      - SPRING_PROFILES_ACTIVE=court
      - SERVER_SERVLET_CONTEXT-PATH=/workflow
      - APP_SERVER_PORT=3006
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/court_system
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - EGOV_USER_SERVICE_HOST=http://digit-user-service:3001
      - EGOV_MDMS_SERVICE_HOST=http://digit-mdms-service:3007
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    volumes:
      - ./court-customizations/configs/workflow-service:/app/config
    depends_on:
      - postgres
      - redis
      - digit-user-service
      - digit-mdms-service
    networks:
      - court-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/workflow/v1/_health"]
      interval: 30s
      timeout: 10s
      retries: 3

  digit-filestore:
    build:
      context: ./core-services/digit-filestore
      dockerfile: Dockerfile
    ports:
      - "3011:3011"
    environment:
      - SPRING_PROFILES_ACTIVE=court
      - SERVER_SERVLET_CONTEXT-PATH=/filestore
      - APP_SERVER_PORT=3011
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/court_system
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - EGOV_USER_SERVICE_HOST=http://digit-user-service:3001
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    volumes:
      - filestore_data:/app/files
      - ./court-customizations/configs/filestore:/app/config
    depends_on:
      - postgres
      - redis
      - digit-user-service
    networks:
      - court-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3011/filestore/v1/_health"]
      interval: 30s
      timeout: 10s
      retries: 3

  digit-notification-service:
    build:
      context: ./core-services/digit-notification-service
      dockerfile: Dockerfile
    ports:
      - "3010:3009"
    environment:
      - SPRING_PROFILES_ACTIVE=court
      - SERVER_SERVLET_CONTEXT-PATH=/notification
      - APP_SERVER_PORT=3009
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/court_system
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    volumes:
      - ./court-customizations/configs/notification-service:/app/config
    depends_on:
      - postgres
      - redis
    networks:
      - court-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3009/notification/v1/_health"]
      interval: 30s
      timeout: 10s
      retries: 3

  digit-indexer:
    build:
      context: ./core-services/digit-indexer
      dockerfile: Dockerfile
    ports:
      - "3012:3012"
    environment:
      - SPRING_PROFILES_ACTIVE=court
      - SERVER_SERVLET_CONTEXT-PATH=/indexer
      - APP_SERVER_PORT=3012
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/court_system
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - EGOV_USER_SERVICE_HOST=http://digit-user-service:3001
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    volumes:
      - ./court-customizations/configs/indexer:/app/config
    depends_on:
      - postgres
      - redis
      - digit-user-service
    networks:
      - court-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3012/indexer/v1/_health"]
      interval: 30s
      timeout: 10s
      retries: 3

  digit-persister:
    build:
      context: ./core-services/digit-persister
      dockerfile: Dockerfile
    ports:
      - "3013:3013"
    environment:
      - SPRING_PROFILES_ACTIVE=court
      - SERVER_SERVLET_CONTEXT-PATH=/persister
      - APP_SERVER_PORT=3013
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/court_system
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - EGOV_USER_SERVICE_HOST=http://digit-user-service:3001
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    volumes:
      - ./court-customizations/configs/persister:/app/config
    depends_on:
      - postgres
      - redis
      - digit-user-service
    networks:
      - court-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3013/persister/v1/_health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Court Services (Your Services)
  case-service:
    build: ../services/case-service
    ports:
      - "3002:3002"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/court_system
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - EGOV_USER_SERVICE_HOST=http://digit-user-service:3001
      - EGOV_MDMS_SERVICE_HOST=http://digit-mdms-service:3007
      - EGOV_WORKFLOW_SERVICE_HOST=http://digit-workflow-service:3006
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - postgres
      - digit-user-service
      - digit-mdms-service
      - digit-workflow-service
    networks:
      - court-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/case/_health"]
      interval: 30s
      timeout: 10s
      retries: 3

  hearing-service:
    build: ../services/hearing-service
    ports:
      - "3005:3005"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/court_system
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - EGOV_USER_SERVICE_HOST=http://digit-user-service:3001
      - EGOV_MDMS_SERVICE_HOST=http://digit-mdms-service:3007
      - EGOV_WORKFLOW_SERVICE_HOST=http://digit-workflow-service:3006
      - EGOV_FILESTORE_URL=http://digit-filestore:3011
      - EGOV_NOTIFICATION_SERVICE_HOST=http://digit-notification-service:3009
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - postgres
      - digit-user-service
      - digit-mdms-service
      - digit-workflow-service
      - digit-filestore
      - digit-notification-service
    networks:
      - court-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/hearing/_health"]
      interval: 30s
      timeout: 10s
      retries: 3

  document-service:
    build: ../services/document-service
    ports:
      - "3003:3003"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/court_system
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - EGOV_USER_SERVICE_HOST=http://digit-user-service:3001
      - EGOV_FILESTORE_URL=http://digit-filestore:3011
      - EGOV_INDEXER_SERVICE_HOST=http://digit-indexer:3012
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - postgres
      - digit-user-service
      - digit-filestore
      - digit-indexer
    networks:
      - court-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/document/_health"]
      interval: 30s
      timeout: 10s
      retries: 3

  court-notification-service:
    build: ../notification-service
    ports:
      - "3009:3009"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=court_system
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - PORT=3009
      - NODE_ENV=development
    depends_on:
      - postgres
    networks:
      - court-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3009/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (Next.js)
  court-frontend:
    build: ./ethiopian-court-nextjs
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5173
      - NEXT_PUBLIC_USER_SERVICE_URL=http://localhost:3001
      - NEXT_PUBLIC_CASE_SERVICE_URL=http://localhost:3002
      - NEXT_PUBLIC_HEARING_SERVICE_URL=http://localhost:3005
      - NEXT_PUBLIC_DOCUMENT_SERVICE_URL=http://localhost:3003
      - NEXT_PUBLIC_NOTIFICATION_SERVICE_URL=http://localhost:3009
      - NEXT_PUBLIC_WS_URL=ws://localhost:5173
    depends_on:
      - digit-user-service
      - digit-mdms-service
      - digit-workflow-service
      - digit-filestore
      - digit-notification-service
      - case-service
      - hearing-service
      - document-service
    networks:
      - court-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API Gateway (Node.js with WebSocket support)
  api-gateway:
    build: ./api-gateway
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - USER_SERVICE_URL=http://digit-user-service:3001
      - CASE_SERVICE_URL=http://case-service:3002
      - HEARING_SERVICE_URL=http://hearing-service:3005
      - DOCUMENT_SERVICE_URL=http://document-service:3003
      - NOTIFICATION_SERVICE_URL=http://digit-notification-service:3009
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - digit-user-service
      - case-service
      - hearing-service
      - document-service
      - digit-notification-service
    networks:
      - court-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  filestore_data:

networks:
  court-network:
    driver: bridge
