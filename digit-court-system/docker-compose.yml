version: '3.8'

services:

  court-api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        SERVICE_NAME: court-api-gateway
    container_name: court-api-gateway
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - PORT=5173
      - DB_HOST=host.docker.internal
      - DB_USER=postgres
      - DB_PASSWORD=dere2010
      - DB_NAME=court
      - DB_PORT=5432
      - AUTH_SVC=http://court-auth-service:3001
      - CASE_SVC=http://court-case-service:3002
      - DOC_SVC=http://court-document-service:3003
      - NOTIF_SVC=http://court-notification-service:3004
      - COMM_SVC=http://court-communication-service:3005
    depends_on:
      - court-auth-service
      - court-case-service
      - court-document-service
      - court-notification-service
      - court-communication-service

  court-auth-service:
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        SERVICE_NAME: court-auth-service
    container_name: court-auth-service
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DB_HOST=host.docker.internal
      - DB_USER=postgres
      - DB_PASSWORD=dere2010
      - DB_NAME=court
      - DB_PORT=5432

  court-case-service:
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        SERVICE_NAME: court-case-service
    container_name: court-case-service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
      - DB_HOST=host.docker.internal
      - DB_USER=postgres
      - DB_PASSWORD=dere2010
      - DB_NAME=court
      - DB_PORT=5432

  court-document-service:
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        SERVICE_NAME: court-document-service
    container_name: court-document-service
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=development
      - PORT=3003
      - DB_HOST=host.docker.internal
      - DB_USER=postgres
      - DB_PASSWORD=dere2010
      - DB_NAME=court
      - DB_PORT=5432

  court-notification-service:
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        SERVICE_NAME: court-notification-service
    container_name: court-notification-service
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=development
      - PORT=3004
      - DB_HOST=host.docker.internal
      - DB_USER=postgres
      - DB_PASSWORD=dere2010
      - DB_NAME=court
      - DB_PORT=5432

  court-communication-service:
    build:
      context: .
      dockerfile: Dockerfile.microservice
      args:
        SERVICE_NAME: court-communication-service
    container_name: court-communication-service
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=development
      - PORT=3005
      - DB_HOST=host.docker.internal
      - DB_USER=postgres
      - DB_PASSWORD=dere2010
      - DB_NAME=court
      - DB_PORT=5432

  court-frontend:
    build:
      context: ./ethiopian-court-nextjs
      dockerfile: Dockerfile
    container_name: court-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
    depends_on:
      - court-api-gateway
