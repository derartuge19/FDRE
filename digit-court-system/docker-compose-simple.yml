version: '3.8'
services:
  # Database Services
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: court_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - court-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - court-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Existing Court Services (already built)
  court-api-gateway:
    image: court-api-gateway:latest
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:5432/court_system
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - court-network

  court-auth-service:
    image: court-auth-service:latest
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:5432/court_system
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - court-network

  court-case-service:
    image: court-case-service:latest
    ports:
      - "3002:3002"
    environment:
      - DATABASE_URL=postgresql://postgres:5432/court_system
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AUTH_SERVICE_URL=http://court-auth-service:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      court-auth-service:
        condition: service_started
    networks:
      - court-network

  court-document-service:
    image: court-document-service:latest
    ports:
      - "3003:3003"
    environment:
      - DATABASE_URL=postgresql://postgres:5432/court_system
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AUTH_SERVICE_URL=http://court-auth-service:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      court-auth-service:
        condition: service_started
    networks:
      - court-network

  court-notification-service:
    image: court-notification-service:latest
    ports:
      - "3004:3004"
    environment:
      - DATABASE_URL=postgresql://postgres:5432/court_system
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AUTH_SERVICE_URL=http://court-auth-service:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      court-auth-service:
        condition: service_started
    networks:
      - court-network

  # Frontend (if built)
  court-frontend:
    image: court-frontend:latest
    ports:
      - "5173:80"
    depends_on:
      - court-api-gateway
    networks:
      - court-network

volumes:
  postgres_data:

networks:
  court-network:
    driver: bridge
